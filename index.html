<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMBER46 | コンセプトカフェ 新宿歌舞伎町</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Noto+Serif+JP:wght@200;300;400;500&family=Shippori+Mincho:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
--tiffany: #7DCFCA;
--tiffany-mid: #5BBFB9;
--tiffany-dark: #3DA8A1;
--tiffany-light: #A8DDD9;
--tiffany-pale: #E4F5F4;
--tiffany-ultra: #F2FAFA;
--pink-pale: #FDF0F3;
--white: #FFFFFF;
--off-white: #FAFCFC;
--text-dark: #1C2B2A;
--text-mid: #3D5654;
--text-light: #7A9C99;
--text-xlight: #B0CECA;
--border: rgba(125,207,202,0.25);
--border-mid: rgba(125,207,202,0.45);
--shadow-sm: 0 4px 20px rgba(61,168,161,0.1);
--shadow: 0 8px 40px rgba(61,168,161,0.13);
--shadow-lg: 0 20px 60px rgba(61,168,161,0.16);
--radius: 16px;
--radius-sm: 10px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
font-family: 'Noto Serif JP', serif;
background: var(--white);
color: var(--text-dark);
overflow-x: hidden;
-webkit-font-smoothing: antialiased;
}
::-webkit-scrollbar { width:3px; }
::-webkit-scrollbar-track { background: var(--tiffany-ultra); }
::-webkit-scrollbar-thumb { background: var(--tiffany); border-radius:2px; }

/* ===== AGE GATE ===== */
#age-gate {
position:fixed; inset:0;
background:rgba(20,40,38,0.65);
backdrop-filter:blur(12px);
z-index:9999;
display:flex; align-items:center; justify-content:center;
padding:20px;
transition:opacity 0.5s;
}
.age-card {
background:white; border-radius:24px;
padding:52px 40px 44px;
max-width:400px; width:100%;
text-align:center;
box-shadow:0 32px 80px rgba(0,0,0,0.2);
}
.age-logo {
font-family:'Cormorant Garamond',serif;
font-size:2rem; font-weight:400;
letter-spacing:0.08em; color:var(--text-dark);
margin-bottom:4px;
}
.age-logo span { color:var(--tiffany-mid); }
.age-sub { font-size:0.72rem; letter-spacing:0.25em; color:var(--text-light); margin-bottom:32px; }
.age-text { font-size:0.88rem; line-height:1.9; color:var(--text-mid); letter-spacing:0.04em; margin-bottom:36px; }
.age-btns { display:flex; gap:12px; }
.age-yes {
flex:1; background:var(--tiffany-mid); color:white;
border:none; border-radius:50px; padding:15px 20px;
font-family:'Noto Serif JP',serif; font-size:0.85rem;
letter-spacing:0.1em; cursor:pointer; transition:all 0.3s;
}
.age-yes:hover { background:var(--tiffany-dark); transform:translateY(-1px); }
.age-no {
flex:1; background:#f3f4f6; color:#9ca3af;
border:none; border-radius:50px; padding:15px 20px;
font-family:'Noto Serif JP',serif; font-size:0.85rem;
letter-spacing:0.1em; cursor:pointer; transition:all 0.3s;
}
.age-no:hover { background:#e5e7eb; }

/* ===== NAV ===== */
nav {
position:fixed; top:0; left:0; right:0; z-index:100;
background:rgba(255,255,255,0.93);
backdrop-filter:blur(20px);
border-bottom:1px solid var(--border);
padding:0 20px; height:60px;
display:flex; align-items:center; justify-content:space-between;
}
.nav-logo {
font-family:'Cormorant Garamond',serif;
font-size:1.4rem; font-weight:400;
letter-spacing:0.1em; color:var(--text-dark); text-decoration:none;
}
.nav-logo span { color:var(--tiffany-mid); }
.nav-right { display:flex; align-items:center; gap:20px; }
.nav-links { display:flex; gap:22px; list-style:none; }
.nav-links a { font-size:0.7rem; letter-spacing:0.15em; color:var(--text-mid); text-decoration:none; transition:color 0.3s; }
.nav-links a:hover { color:var(--tiffany-dark); }
.nav-btn {
background:var(--tiffany-mid); color:white;
border:none; border-radius:50px; padding:9px 20px;
font-family:'Noto Serif JP',serif; font-size:0.75rem;
letter-spacing:0.1em; cursor:pointer; text-decoration:none;
transition:all 0.3s; white-space:nowrap;
}
.nav-btn:hover { background:var(--tiffany-dark); transform:translateY(-1px); }
@media(max-width:640px){ .nav-links{display:none;} }

/* ===== HERO ===== */
#hero {
min-height:100vh; padding-top:60px;
background:linear-gradient(160deg,#FFFFFF 0%,#F5FBFB 50%,var(--tiffany-pale) 100%);
display:flex; flex-direction:column;
align-items:center; justify-content:center;
position:relative; overflow:hidden;
text-align:center; padding-left:24px; padding-right:24px;
}
.orb {
position:absolute; border-radius:50%; pointer-events:none;
}
.orb1 { width:600px;height:600px;top:-150px;right:-150px;background:radial-gradient(circle,rgba(125,207,202,0.1) 0%,transparent 70%); }
.orb2 { width:400px;height:400px;bottom:-80px;left:-80px;background:radial-gradient(circle,rgba(125,207,202,0.08) 0%,transparent 70%); }
.orb3 { width:200px;height:200px;top:30%;left:5%;background:radial-gradient(circle,rgba(249,215,227,0.35) 0%,transparent 70%); }

.hero-logo-box {
width:180px;height:180px;
background:white; border-radius:20px;
box-shadow:var(--shadow);
display:flex; align-items:center; justify-content:center;
margin:0 auto 36px; position:relative; z-index:2; overflow:hidden;
}
.hero-logo-box img { width:100%;height:100%;object-fit:cover; display:block; }
.logo-placeholder { text-align:center; }
.logo-placeholder .lt {
font-family:'Cormorant Garamond',serif;
font-size:2.1rem;font-weight:400;
letter-spacing:0.08em;color:var(--text-dark);line-height:1;
}
.logo-placeholder .lt span { color:var(--tiffany-mid); }
.logo-placeholder .ls { font-size:0.6rem;letter-spacing:0.3em;color:var(--text-light);margin-top:6px; }

.hero-catch {
font-family:'Noto Serif JP',serif;
font-size:clamp(2.1rem,8vw,3.2rem);
font-weight:300; letter-spacing:0.15em;
color:var(--text-dark); margin-bottom:18px; line-height:1.3;
position:relative; z-index:2;
}
.hero-sub {
font-size:0.9rem; letter-spacing:0.08em;
color:var(--text-mid); line-height:2; margin-bottom:6px;
position:relative; z-index:2;
}
.hero-sub strong { color:var(--tiffany-dark); font-weight:400; }
.hero-sub2 {
font-size:0.84rem; letter-spacing:0.08em;
color:var(--text-light); margin-bottom:40px;
position:relative; z-index:2;
}
.hero-badge {
display:inline-flex; align-items:center; gap:8px;
background:white; border:1px solid var(--border-mid);
border-radius:50px; padding:8px 20px;
font-size:0.74rem; letter-spacing:0.15em; color:var(--text-mid);
margin-bottom:32px; position:relative; z-index:2;
box-shadow:var(--shadow-sm);
}
.hero-badge::before { content:'✦'; color:var(--tiffany); font-size:0.6rem; }

.hero-btns {
display:flex; flex-direction:column; gap:13px;
align-items:center; position:relative; z-index:2;
width:100%; max-width:320px; margin:0 auto;
}
.btn-main {
display:flex; align-items:center; justify-content:center; gap:10px;
width:100%; background:var(--tiffany-mid); color:white;
border:none; border-radius:50px; padding:17px 32px;
font-family:'Noto Serif JP',serif; font-size:0.88rem;
letter-spacing:0.12em; text-decoration:none; cursor:pointer;
transition:all 0.3s; box-shadow:0 8px 28px rgba(91,191,185,0.35);
}
.btn-main:hover { transform:translateY(-2px); box-shadow:0 12px 36px rgba(91,191,185,0.45); }
.btn-sub {
display:flex; align-items:center; justify-content:center;
width:100%; background:rgba(255,255,255,0.85); color:var(--text-mid);
border:1px solid var(--border-mid); border-radius:50px; padding:15px 32px;
font-family:'Noto Serif JP',serif; font-size:0.84rem;
letter-spacing:0.12em; cursor:pointer; transition:all 0.3s;
}
.btn-sub:hover { background:var(--tiffany-pale); border-color:var(--tiffany-mid); }

.hero-scroll {
position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
display:flex; flex-direction:column; align-items:center; gap:6px;
animation:sa 2.4s ease-in-out infinite;
}
.hero-scroll span { font-family:'Cormorant Garamond',serif; font-size:0.58rem; letter-spacing:0.45em; color:var(--text-xlight); }
.scroll-line { width:1px;height:36px;background:linear-gradient(180deg,var(--tiffany-light),transparent); }
@keyframes sa { 0%,100%{transform:translateX(-50%) translateY(0);opacity:1;} 50%{transform:translateX(-50%) translateY(-8px);opacity:0.6;} }

/* ===== SECTIONS ===== */
.section-label {
display:flex; align-items:center; gap:10px;
font-size:0.68rem; letter-spacing:0.35em; color:var(--tiffany-mid);
text-transform:uppercase; margin-bottom:10px;
}
.section-label::before { content:'';display:block;width:28px;height:1px;background:var(--tiffany-mid); }

.section-title {
font-family:'Noto Serif JP',serif;
font-size:clamp(1.7rem,5vw,2.5rem); font-weight:300;
letter-spacing:0.08em; color:var(--text-dark);
margin-bottom:14px; line-height:1.3;
}
.section-desc { font-size:0.84rem; color:var(--text-light); letter-spacing:0.06em; line-height:1.9; }

/* ===== CONCEPT ===== */
#concept { padding:80px 24px; background:white; position:relative; overflow:hidden; }

.concept-photo-grid {
display:grid; grid-template-columns:1fr 1fr;
gap:12px; margin-bottom:40px; position:relative;
}
.cp {
border-radius:var(--radius); overflow:hidden;
aspect-ratio:4/3;
display:flex; align-items:center; justify-content:center;
font-size:2.6rem;
}
.cp1 { background:linear-gradient(135deg,#FFF0F3,#FDE8EE); }
.cp2 { background:linear-gradient(135deg,var(--tiffany-pale),var(--tiffany-ultra)); margin-top:20px; }
.cp3 {
grid-column:1/-1; height:72px;
background:linear-gradient(135deg,var(--pink-pale),#FDE8EE);
border-radius:var(--radius-sm); display:flex;
align-items:center; justify-content:space-between; padding:0 22px;
font-size:0.72rem; letter-spacing:0.1em; color:var(--text-light);
}
.concept-badge-pill {
position:absolute; bottom:62px; left:14px;
background:white; border:1px solid var(--border-mid);
border-radius:50px; padding:7px 16px;
font-size:0.72rem; letter-spacing:0.12em; color:var(--text-mid);
box-shadow:var(--shadow-sm); display:flex; align-items:center; gap:6px;
}
.concept-heading {
font-family:'Noto Serif JP',serif;
font-size:clamp(1.4rem,5vw,1.9rem); font-weight:300;
line-height:1.6; letter-spacing:0.06em; color:var(--text-dark);
margin-bottom:18px;
}
.concept-heading em { color:var(--tiffany-mid); font-style:normal; font-weight:400; }
.concept-body { font-size:0.86rem; line-height:2.1; color:var(--text-mid); letter-spacing:0.04em; }

/* ===== CAST ===== */
#cast { padding:80px 24px; background:var(--tiffany-ultra); }
.cast-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:28px; }
.cast-card {
background:white; border-radius:var(--radius);
overflow:hidden; box-shadow:var(--shadow-sm);
transition:transform 0.3s,box-shadow 0.3s;
}
.cast-card:hover { transform:translateY(-4px); box-shadow:var(--shadow); }
.cast-img {
width:100%; aspect-ratio:3/2.5;
display:flex; align-items:center; justify-content:center;
font-size:2.8rem; position:relative;
}
.cast-no {
position:absolute; top:10px; right:10px;
font-family:'Cormorant Garamond',serif; font-style:italic;
font-size:0.74rem; letter-spacing:0.05em; color:var(--text-light);
background:rgba(255,255,255,0.88); border-radius:50px; padding:3px 10px;
}
.cast-body { padding:14px 14px 16px; }
.cast-name { font-size:0.95rem; letter-spacing:0.08em; color:var(--text-dark); margin-bottom:3px; font-weight:400; }
.cast-name-en {
font-family:'Cormorant Garamond',serif; font-size:0.76rem;
color:var(--tiffany-mid); letter-spacing:0.05em; font-style:italic; margin-bottom:9px;
}
.cast-tags { display:flex; flex-wrap:wrap; gap:5px; }
.cast-tag {
font-size:0.64rem; letter-spacing:0.06em; color:var(--text-light);
background:var(--tiffany-ultra); border:1px solid var(--border);
border-radius:50px; padding:3px 10px;
}

/* ===== PLAN ===== */
#plan { padding:80px 24px; background:white; }
.plan-list { display:flex; flex-direction:column; gap:20px; margin-top:28px; }
.plan-card { border-radius:var(--radius); padding:32px 26px; position:relative; overflow:hidden; }
.plan-premium {
background:linear-gradient(135deg,var(--tiffany-pale) 0%,rgba(125,207,202,0.06) 100%);
border:1px solid var(--border-mid);
}
.plan-normal {
background:linear-gradient(135deg,#FDF0F3 0%,#FDE8EE 100%);
border:1px solid rgba(249,180,200,0.4);
}
.plan-badge {
display:inline-flex; align-items:center; gap:6px;
border-radius:50px; padding:5px 14px;
font-size:0.67rem; letter-spacing:0.18em; margin-bottom:16px;
}
.plan-premium .plan-badge { background:rgba(125,207,202,0.2); border:1px solid var(--border-mid); color:var(--tiffany-dark); }
.plan-normal .plan-badge { background:rgba(249,180,200,0.25); border:1px solid rgba(249,180,200,0.5); color:#c06080; }
.plan-name {
font-family:'Noto Serif JP',serif;
font-size:1.45rem; font-weight:300;
letter-spacing:0.06em; color:var(--text-dark); margin-bottom:7px;
}
.plan-sub { font-size:0.79rem; color:var(--text-light); letter-spacing:0.06em; line-height:1.8; margin-bottom:22px; }
.plan-price {
font-family:'Cormorant Garamond',serif;
font-size:2.9rem; font-weight:300;
color:var(--text-dark); letter-spacing:0.02em; line-height:1; margin-bottom:8px;
}
.plan-time-tag {
display:inline-flex; align-items:center; gap:5px;
background:rgba(255,255,255,0.75); border-radius:50px;
padding:5px 14px; font-size:0.74rem; letter-spacing:0.1em;
color:var(--text-mid); margin-bottom:20px;
}
.plan-items { list-style:none; }
.plan-items li {
font-size:0.81rem; color:var(--text-mid); letter-spacing:0.04em;
padding:5px 0; display:flex; align-items:center; gap:8px;
}
.plan-items li::before { content:'—'; color:var(--tiffany-light); font-size:0.7rem; }
.plan-normal .plan-items li::before { color:#f0b0c0; }
.plan-deco { position:absolute; top:16px; right:20px; font-size:1.1rem; opacity:0.45; }

/* ===== RULES ===== */
#rules { padding:80px 24px; background:var(--tiffany-ultra); }
.rules-card {
background:white; border-radius:var(--radius);
padding:26px 22px; box-shadow:var(--shadow-sm); margin-top:22px;
}
.rules-intro {
font-size:0.83rem; color:var(--text-mid); line-height:2;
letter-spacing:0.04em; padding-bottom:18px; margin-bottom:8px;
border-bottom:1px solid var(--border);
}
.rule-row {
display:flex; align-items:center; gap:14px;
padding:12px 0; border-bottom:1px solid rgba(125,207,202,0.1);
}
.rule-row:last-child { border-bottom:none; }
.rule-icon {
width:38px;height:38px; border-radius:var(--radius-sm);
background:var(--pink-pale); display:flex; align-items:center;
justify-content:center; font-size:1.1rem; flex-shrink:0;
}
.rule-text { font-size:0.84rem; letter-spacing:0.04em; color:var(--text-mid); line-height:1.5; }

/* ===== SNS ===== */
#sns { padding:80px 24px; background:white; }
.sns-list { display:flex; flex-direction:column; gap:16px; margin-top:28px; }
.sns-card {
border-radius:var(--radius); padding:22px 20px;
text-decoration:none; transition:transform 0.3s,box-shadow 0.3s; display:block;
}
.sns-card:hover { transform:translateY(-3px); box-shadow:var(--shadow); }
.sns-ig {
background:linear-gradient(135deg,#FFF0F4 0%,#FDE8F0 100%);
border:1px solid rgba(220,100,150,0.2);
}
.sns-tw {
background:linear-gradient(135deg,var(--tiffany-pale) 0%,var(--tiffany-ultra) 100%);
border:1px solid var(--border);
}
.sns-tk {
background:linear-gradient(135deg,#F0F0F8 0%,#E8E8F4 100%);
border:1px solid rgba(100,100,180,0.15);
}
.sns-top { display:flex; align-items:center; gap:14px; margin-bottom:13px; }
.sns-icon {
width:52px;height:52px; border-radius:14px;
display:flex; align-items:center; justify-content:center;
flex-shrink:0;
}
.sns-ig .sns-icon { background:linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }
.sns-tw .sns-icon { background:#1da1f2; }
.sns-tk .sns-icon { background:#010101; }
.sns-pname { font-family:'Cormorant Garamond',serif; font-size:1.1rem; letter-spacing:0.08em; color:var(--text-dark); font-weight:500; }
.sns-handle { font-size:0.71rem; letter-spacing:0.05em; color:var(--text-light); margin-top:2px; }
.sns-body { font-size:0.81rem; color:var(--text-mid); line-height:1.9; letter-spacing:0.04em; margin-bottom:13px; }
.sns-hl { font-weight:500; display:block; margin-top:3px; }
.sns-ig .sns-hl { color:#c0306a; }
.sns-tw .sns-hl { color:var(--tiffany-dark); }
.sns-tk .sns-hl { color:#5050b0; }
.sns-btn {
display:inline-flex; align-items:center; gap:6px;
border-radius:50px; padding:7px 17px;
font-size:0.74rem; letter-spacing:0.1em;
border:none; cursor:pointer; transition:all 0.3s;
font-family:'Noto Serif JP',serif;
}
.sns-ig .sns-btn { background:rgba(192,48,106,0.12); color:#c0306a; }
.sns-tw .sns-btn { background:rgba(125,207,202,0.2); color:var(--tiffany-dark); }
.sns-tk .sns-btn { background:rgba(80,80,176,0.12); color:#5050b0; }

/* ===== ACCESS ===== */
#access { padding:80px 24px; background:var(--tiffany-ultra); }
.access-list { display:flex; flex-direction:column; gap:11px; margin-top:28px; }
.access-row {
background:white; border-radius:var(--radius-sm);
padding:17px 18px; display:flex; align-items:flex-start;
gap:13px; box-shadow:var(--shadow-sm);
}
.access-icon {
width:42px;height:42px; background:var(--tiffany-pale);
border-radius:var(--radius-sm); display:flex; align-items:center;
justify-content:center; font-size:1.2rem; flex-shrink:0;
}
.access-label { font-size:0.7rem; letter-spacing:0.15em; color:var(--tiffany-dark); margin-bottom:4px; font-weight:500; }
.access-val { font-size:0.86rem; color:var(--text-mid); letter-spacing:0.04em; line-height:1.8; }
.access-val a { color:var(--tiffany-dark); text-decoration:none; }
.access-map {
border-radius:var(--radius); overflow:hidden;
margin-top:18px; box-shadow:var(--shadow-sm);
height:260px; border:1px solid var(--border);
}
.access-map iframe { width:100%;height:100%;border:none;display:block; }

/* ===== RESERVE CTA ===== */
#reserve-cta {
padding:80px 24px;
background:linear-gradient(160deg,var(--tiffany-mid) 0%,var(--tiffany-dark) 100%);
text-align:center; position:relative; overflow:hidden;
}
#reserve-cta::before {
content:'46'; position:absolute;
font-family:'Cormorant Garamond',serif;
font-size:40vw; font-weight:300;
color:rgba(255,255,255,0.04);
top:50%;left:50%; transform:translate(-50%,-50%);
pointer-events:none; line-height:1; letter-spacing:-0.05em;
}
.cta-title {
font-family:'Noto Serif JP',serif;
font-size:clamp(1.4rem,5vw,2.1rem); font-weight:300;
color:white; letter-spacing:0.1em; margin-bottom:10px; line-height:1.4;
}
.cta-sub {
font-family:'Cormorant Garamond',serif; font-style:italic;
font-size:0.86rem; letter-spacing:0.15em;
color:rgba(255,255,255,0.7); margin-bottom:38px;
}
.btn-white {
display:inline-flex; align-items:center; gap:10px;
background:white; color:var(--tiffany-dark);
border-radius:50px; padding:17px 42px;
font-family:'Noto Serif JP',serif; font-size:0.88rem;
letter-spacing:0.12em; text-decoration:none; transition:all 0.3s;
box-shadow:0 8px 28px rgba(0,0,0,0.15);
}
.btn-white:hover { transform:translateY(-3px); box-shadow:0 16px 40px rgba(0,0,0,0.2); }

/* ===== RECRUIT ===== */
#recruit { padding:80px 24px; background:white; text-align:center; }
.recruit-text {
font-size:0.88rem; color:var(--text-mid); line-height:2.2;
letter-spacing:0.05em; margin-bottom:32px;
max-width:480px; margin-left:auto; margin-right:auto;
}

/* ===== FOOTER ===== */
footer { background:var(--text-dark); padding:52px 24px 36px; }
.f-logo { font-family:'Cormorant Garamond',serif; font-size:1.6rem; font-weight:300; color:white; letter-spacing:0.1em; margin-bottom:4px; }
.f-logo span { color:var(--tiffany-light); }
.f-addr { font-size:0.74rem; color:rgba(255,255,255,0.33); letter-spacing:0.08em; line-height:1.9; margin-bottom:28px; }

/* ===== MODAL ===== */
.modal-wrap {
position:fixed; inset:0;
background:rgba(20,40,38,0.7); backdrop-filter:blur(10px);
z-index:1000; display:flex; align-items:center; justify-content:center;
padding:20px; opacity:0; pointer-events:none; transition:opacity 0.3s;
}
.modal-wrap.on { opacity:1; pointer-events:all; }
.modal-box {
background:white; border-radius:20px;
padding:44px 34px; max-width:540px; width:100%;
position:relative; transform:translateY(14px);
transition:transform 0.3s; max-height:85vh; overflow-y:auto;
}
.modal-wrap.on .modal-box { transform:translateY(0); }
.modal-close { position:absolute;top:14px;right:18px; background:none;border:none; font-size:1.3rem;cursor:pointer;color:var(--text-light);transition:color 0.2s;line-height:1; }
.modal-close:hover { color:var(--text-dark); }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:400; letter-spacing:0.08em; margin-bottom:5px; color:var(--text-dark); }
.modal-stitle { font-size:0.71rem; color:var(--text-light); letter-spacing:0.12em; margin-bottom:26px; }
.modal-body p { font-size:0.82rem; color:var(--text-mid); line-height:2.1; letter-spacing:0.04em; margin-bottom:14px; }
.modal-body strong { color:var(--text-dark); font-weight:500; display:block; margin-bottom:3px; }

/* ===== FADE ===== */
.fi { opacity:0; transform:translateY(18px); transition:opacity 0.6s ease,transform 0.6s ease; }
.fi.show { opacity:1; transform:translateY(0); }
</style>
